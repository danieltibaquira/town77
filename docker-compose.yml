services:
  nginx:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_PATH: /data/town77.db
      LOG_LEVEL: info
      CORS_ORIGIN: "*"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
